name: CI
on:
  pull_request:
  push:
    branches: [main, dev-branch]

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.linux.txt
      - run: pip install pip-tools
      - run: pip-sync requirements.linux.txt requirements-dev.linux.txt
      - run: ruff check src/ tests/
      - name: mypy (ratchet against baseline)
        run: mypy --strict src/ | mypy-baseline filter --baseline-path .mypy-baseline

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.linux.txt
      - run: pip install pip-tools
      - run: pip-sync requirements.linux.txt requirements-dev.linux.txt
      - run: pytest tests/ -q -m "not slow and not integration and not canary"
      - name: Upload Golden Diff Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-diff-reports
          path: artifacts/golden-diffs
          if-no-files-found: ignore

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.linux.txt
      - uses: actions/cache@v4
        with:
          path: ~/.duckdb/extensions
          key: duckdb-spatial-${{ runner.os }}-${{ hashFiles('requirements.linux.txt') }}
      - run: pip install pip-tools && pip-sync requirements.linux.txt requirements-dev.linux.txt
      - run: pytest tests/ -q -m integration

  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-type, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -c "from o2agol.cleanup import cleanup_stale_files; cleanup_stale_files(0)"
