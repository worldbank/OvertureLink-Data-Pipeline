name: CI
on:
  pull_request:
  push:
    branches: [main, dev-branch]

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check src/
      - name: mypy (ratchet against baseline)
        run: mypy --strict src/ | mypy-baseline filter --baseline-path .mypy-baseline

  smoke-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: python -c "import o2agol; import o2agol.cli; print('smoke ok')"

  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-type, smoke-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -c "from o2agol.cleanup import cleanup_stale_files; cleanup_stale_files(0)"
